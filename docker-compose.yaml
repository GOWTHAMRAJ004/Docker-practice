services:

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:80"
    networks:
      - fullstack-network

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: G0wth@m_04
      DB_NAME: myapp
    networks:
      - fullstack-network
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_PASSWORD: G0wth@m_04
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fullstack-network


networks:
  fullstack-network:


volumes:
  postgres-data: